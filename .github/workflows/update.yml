name: Live update (standings + schedule)

# Polls football-data.org for new results and auto-refreshes the dashboard.
# Needs repo secret FOOTBALL_DATA_TOKEN (Settings → Secrets → Actions).
on:
  schedule:
    - cron: '*/15 * * * *'      # every 15 min (UTC)
  workflow_dispatch:            # manual "Run workflow" button

permissions:
  contents: write

concurrency:                    # never let two updates race on a push
  group: live-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # only run inside the tournament window (no-op before/after) — keeps API
      # quota and Actions minutes from being spent year-round
      - id: window
        run: |
          today=$(date -u +%Y%m%d)
          if [ "$today" -ge 20260608 ] && [ "$today" -le 20260721 ]; then
            echo "go=yes" >> "$GITHUB_OUTPUT"
          else
            echo "go=no (outside 2026-06-10..07-21)" >> "$GITHUB_OUTPUT"
            echo "go=no" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.window.outputs.go == 'yes'
        with:
          python-version: '3.12'

      - name: Fetch results, refresh live sections, and push
        if: steps.window.outputs.go == 'yes'
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: |
          pip install -q numpy pulp
          git config user.name  "totocalcio-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # A manual push (or external workflow_dispatch) can land between this
          # runner's checkout and its push, rejecting us with "fetch first".
          # Every file the pipeline writes is generated, so on a rejection we
          # discard our work, re-sync to the latest origin/main, and regenerate
          # rather than merge — no conflicts, and the commit always reflects the
          # freshest results.
          for attempt in 1 2 3 4 5; do
            git fetch --quiet origin main
            git reset --hard --quiet FETCH_HEAD
            python report/fetch_matches.py
            # best/worst-case re-sim (no-op if no new result); never block the
            # standings/schedule refresh below if the sim itself breaks
            python report/refresh_cases.py || echo "::warning::refresh_cases failed — standings still updated"
            python report/refresh_live.py
            git add -A
            if git diff --cached --quiet; then
              echo "no changes"; exit 0
            fi
            git commit -m "live: auto-update standings + schedule [skip ci]"
            if git push; then
              echo "pushed on attempt $attempt"; exit 0
            fi
            echo "push rejected (remote advanced) — resyncing and retrying ($attempt/5)"
          done
          echo "::error::failed to push live update after 5 attempts"; exit 1
